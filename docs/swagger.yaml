basePath: /
definitions:
  dto.ArticleDetailResp:
    properties:
      categories:
        description: Categories 分类列表。
        items:
          $ref: '#/definitions/dto.ArticleRelationResp'
        type: array
      category:
        allOf:
        - $ref: '#/definitions/dto.ArticleRelationResp'
        description: Category 文章所属分类（每篇文章归属一个分类）。
      category_ids:
        description: CategoryIDs 分类 ID 列表。
        items:
          type: integer
        type: array
      comment_count:
        description: CommentCount 评论数量。
        example: 2
        type: integer
      comment_status:
        description: CommentStatus 评论状态。
        example: 1
        type: integer
      content:
        description: Content 文章正文。
        type: string
      cover_img_url:
        description: CoverImgUrl 封面图地址。
        type: string
      created_at:
        description: CreatedAt 创建时间。
        type: string
      id:
        description: ID 文章 ID。
        example: 1
        type: integer
      is_liked:
        description: IsLiked 当前用户是否已点赞。
        example: false
        type: boolean
      is_recommended:
        description: IsRecommended 是否为推荐文章。
        example: true
        type: boolean
      like_count:
        description: LikeCount 点赞数量。
        example: 3
        type: integer
      music:
        description: Music 音乐列表。
        items:
          $ref: '#/definitions/dto.ArticleMusicResp'
        type: array
      music_ids:
        description: MusicIDs 音乐 ID 列表。
        items:
          type: integer
        type: array
      passworded:
        description: Passworded 是否为加密文章。
        example: false
        type: boolean
      read_count:
        description: ReadCount 阅读数量。
        example: 20
        type: integer
      recommend_seq:
        description: RecommendSeq 推荐排序值。
        example: 10
        type: integer
      short_content:
        description: ShortContent 文章摘要。
        type: string
      status:
        description: Status 文章状态。
        example: 1
        type: integer
      tag_ids:
        description: TagIDs 标签 ID 列表。
        items:
          type: integer
        type: array
      tags:
        description: Tags 标签列表。
        items:
          $ref: '#/definitions/dto.ArticleRelationResp'
        type: array
      title:
        description: Title 文章标题。
        example: 文章标题
        type: string
      updated_at:
        description: UpdatedAt 更新时间。
        type: string
      user_id:
        description: UserID 作者用户 ID。
        example: 1
        type: integer
    type: object
  dto.ArticleIDsResp:
    properties:
      ids:
        description: IDs 文章 ID 列表。
        example:
        - 1
        - 2
        - 3
        items:
          type: integer
        type: array
    type: object
  dto.ArticleLikeResp:
    properties:
      is_liked:
        description: IsLiked 当前用户是否已点赞。
        example: true
        type: boolean
      like_count:
        description: LikeCount 点赞数量。
        example: 3
        type: integer
    type: object
  dto.ArticleListItemResp:
    properties:
      category:
        allOf:
        - $ref: '#/definitions/dto.ArticleRelationResp'
        description: Category 文章所属分类（每篇文章归属一个分类）。
      comment_count:
        description: CommentCount 评论数量。
        example: 2
        type: integer
      comment_status:
        description: CommentStatus 评论状态。
        example: 1
        type: integer
      cover_img_url:
        description: CoverImgUrl 封面图地址。
        type: string
      created_at:
        description: CreatedAt 创建时间。
        type: string
      id:
        description: ID 文章 ID。
        example: 1
        type: integer
      is_recommended:
        description: IsRecommended 是否为推荐文章。
        example: true
        type: boolean
      like_count:
        description: LikeCount 点赞数量。
        example: 3
        type: integer
      read_count:
        description: ReadCount 阅读数量。
        example: 20
        type: integer
      short_content:
        description: ShortContent 文章摘要。
        type: string
      status:
        description: Status 文章状态。
        example: 1
        type: integer
      title:
        description: Title 文章标题。
        example: 文章标题
        type: string
      updated_at:
        description: UpdatedAt 更新时间。
        type: string
      user_id:
        description: UserID 作者用户 ID。
        example: 1
        type: integer
    type: object
  dto.ArticleMusicResp:
    properties:
      album:
        description: Album 专辑名称。
        example: Album
        type: string
      cover_img_url:
        description: CoverImgUrl 音乐封面图地址。
        type: string
      duration:
        description: Duration 音乐时长，单位为秒。
        example: 240
        type: integer
      id:
        description: ID 音乐 ID。
        example: 1
        type: integer
      name:
        description: Name 音乐名称。
        example: Song
        type: string
      singer:
        description: Singer 歌手名称。
        example: Singer
        type: string
      url:
        description: URL 音乐播放地址。
        type: string
    type: object
  dto.ArticlePageResp:
    properties:
      list:
        description: List 文章列表。
        items:
          $ref: '#/definitions/dto.ArticleListItemResp'
        type: array
      page:
        description: Page 当前页码。
        example: 1
        type: integer
      page_size:
        description: PageSize 每页数量。
        example: 10
        type: integer
      pages:
        description: Pages 总页数。
        example: 10
        type: integer
      total:
        description: Total 总记录数。
        example: 100
        type: integer
    type: object
  dto.ArticleReadResp:
    properties:
      id:
        description: ID 文章 ID。
        example: 1
        type: integer
      read_count:
        description: ReadCount 阅读数量。
        example: 21
        type: integer
    type: object
  dto.ArticleRelationResp:
    properties:
      cover_img_url:
        description: CoverImgUrl 关联资源封面图地址。
        type: string
      description:
        description: Description 关联资源描述。
        type: string
      icon:
        description: Icon 关联资源图标。
        type: string
      id:
        description: ID 关联资源 ID。
        example: 1
        type: integer
      name:
        description: Name 关联资源名称。
        example: Go
        type: string
      url:
        description: URL 关联资源访问地址或别名。
        example: go
        type: string
    type: object
  dto.ArticleSaveReq:
    properties:
      category_ids:
        description: CategoryIDs 分类 ID 列表，至少一个；当前每篇文章只归属第一个有效分类。
        example:
        - 1
        items:
          type: integer
        minItems: 1
        type: array
      comment_status:
        description: CommentStatus 评论状态：0 关闭，1 开启。
        enum:
        - 0
        - 1
        example: 1
        type: integer
      content:
        description: Content Markdown 正文内容。
        example: Markdown 正文
        type: string
      cover_img_url:
        description: CoverImgUrl 封面图地址。
        example: https://example.com/cover.jpg
        type: string
      id:
        description: ID 文章 ID，为空或 0 表示新增。
        example: 1
        type: integer
      music_ids:
        description: MusicIDs 音乐 ID 列表。
        example:
        - 1
        items:
          type: integer
        type: array
      password:
        description: Password 加密文章密码。
        example: secret
        type: string
      recommend:
        description: Recommend 是否推荐文章。
        example: false
        type: boolean
      recommend_seq:
        description: RecommendSeq 推荐排序值。
        example: 10
        type: integer
      short_content:
        description: ShortContent 文章摘要。
        example: 摘要
        type: string
      status:
        description: Status 文章状态：0 隐藏，1 公开，2 加密。
        enum:
        - 0
        - 1
        - 2
        example: 1
        type: integer
      tag_ids:
        description: TagIDs 标签 ID 列表。
        example:
        - 1
        items:
          type: integer
        type: array
      title:
        description: Title 文章标题。
        example: 文章标题
        type: string
    required:
    - category_ids
    - content
    - title
    type: object
  dto.CategoryArticlesReq:
    properties:
      article_ids:
        description: ArticleIDs 文章 ID 列表；单篇文章也使用一个元素的数组。
        example:
        - 1
        items:
          type: integer
        type: array
    required:
    - article_ids
    type: object
  dto.CategoryArticlesResp:
    properties:
      affected_count:
        description: AffectedCount 实际影响的关联数量。
        example: 2
        type: integer
      article_ids:
        description: ArticleIDs 本次请求归一化后的文章 ID 列表。
        items:
          type: integer
        type: array
      category_id:
        description: CategoryID 分类 ID。
        example: 1
        type: integer
    type: object
  dto.CategoryCreateReq:
    properties:
      cover_img_url:
        description: CoverImgUrl 封面图地址或对象 key。
        example: covers/programming.jpg
        type: string
      description:
        description: Description 分类描述。
        example: 编程学习与工程实践
        type: string
      icon:
        description: Icon 图标地址或对象 key。
        example: icons/programming.svg
        type: string
      name:
        description: Name 分类名称。
        example: 编程
        type: string
      parent_id:
        description: ParentID 父分类 ID，当前仅预留，不参与层级逻辑。
        example: 1
        type: integer
      seq:
        description: Seq 排序值，越小越靠前；0 是有效值，因此用指针区分未传。
        example: 0
        type: integer
      url:
        description: URL 分类路由别名。
        example: programming
        type: string
    required:
    - cover_img_url
    - description
    - icon
    - name
    - seq
    type: object
  dto.CategoryItemResp:
    properties:
      article_count:
        description: ArticleCount 该分类下的公开文章数量。
        example: 12
        type: integer
      cover_img_url:
        description: CoverImgUrl 封面图地址或对象 key。
        type: string
      description:
        description: Description 分类描述。
        type: string
      icon:
        description: Icon 图标 URL 或对象 key。
        type: string
      id:
        description: ID 分类 ID。
        example: 1
        type: integer
      name:
        description: Name 分类名称。
        example: 编程
        type: string
      parent_id:
        description: ParentID 父分类 ID，当前仅预留。
        example: 1
        type: integer
      seq:
        description: Seq 排序值，越小越靠前。
        example: 0
        type: integer
      url:
        description: URL 分类路由别名。
        example: programming
        type: string
    type: object
  dto.CategoryTabItem:
    properties:
      article_count:
        description: ArticleCount 该分类下的公开文章数量。
        example: 12
        type: integer
      cover_img_url:
        description: CoverImgUrl 封面图地址。
        type: string
      description:
        description: Description 分类描述。
        type: string
      icon:
        description: Icon 图标 URL。
        type: string
      id:
        description: ID 分类 ID。
        example: 1
        type: integer
      name:
        description: Name 分类名称。
        example: 编程
        type: string
      seq:
        description: Seq 排序值，越小越靠前。
        example: 0
        type: integer
      url:
        description: URL 分类路由别名。
        example: programming
        type: string
    type: object
  dto.CategoryTabsResp:
    properties:
      list:
        description: List 分类列表，按 seq ASC、文章数量 DESC 排序。
        items:
          $ref: '#/definitions/dto.CategoryTabItem'
        type: array
    type: object
  dto.CategoryUpdateReq:
    properties:
      cover_img_url:
        description: CoverImgUrl 封面图地址或对象 key；传空字符串表示清空。
        example: covers/programming.jpg
        type: string
      description:
        description: Description 分类描述；传空字符串表示清空。
        example: 编程学习与工程实践
        type: string
      icon:
        description: Icon 图标地址或对象 key；传空字符串表示清空。
        example: icons/programming.svg
        type: string
      name:
        description: Name 分类名称。
        example: 编程
        type: string
      parent_id:
        description: ParentID 父分类 ID，当前仅预留，不参与层级逻辑。
        example: 1
        type: integer
      seq:
        description: Seq 排序值，越小越靠前。
        example: 0
        type: integer
      url:
        description: URL 分类路由别名；传空字符串表示清空。
        example: programming
        type: string
    type: object
  dto.CommentCreateReq:
    properties:
      content:
        description: Content 评论内容，去除首尾空白后不能为空，最多 2000 字符。
        example: 写得真好
        maxLength: 2000
        type: string
      target_id:
        description: TargetID 评论目标 ID；文章为 article_id，说说为 moment_id，留言板为 owner_user_id。
        example: 1
        type: integer
      target_type:
        description: TargetType 评论目标类型：article、moment、guestbook。
        enum:
        - article
        - moment
        - guestbook
        example: article
        type: string
    required:
    - content
    - target_id
    - target_type
    type: object
  dto.CommentDeleteResp:
    properties:
      id:
        description: ID 被删除的评论或回复 ID。
        example: 1
        type: integer
    type: object
  dto.CommentItemResp:
    properties:
      content:
        description: Content 评论内容。
        example: 写得真好
        type: string
      created_at:
        description: CreatedAt 创建时间。
        type: string
      id:
        description: ID 评论 ID。
        example: 1
        type: integer
      replies:
        description: Replies 当前页一级评论下的回复列表。
        items:
          $ref: '#/definitions/dto.CommentReplyResp'
        type: array
      target_id:
        description: TargetID 评论目标 ID。
        example: 1
        type: integer
      target_type:
        description: TargetType 评论目标类型。
        example: article
        type: string
      updated_at:
        description: UpdatedAt 更新时间。
        type: string
      user:
        allOf:
        - $ref: '#/definitions/dto.CommentUserResp'
        description: User 评论者用户摘要。
      user_id:
        description: UserID 评论者用户 ID。
        example: 1
        type: integer
    type: object
  dto.CommentPageResp:
    properties:
      list:
        description: List 评论列表。
        items:
          $ref: '#/definitions/dto.CommentItemResp'
        type: array
      page:
        description: Page 当前页码。
        example: 1
        type: integer
      page_size:
        description: PageSize 每页数量。
        example: 10
        type: integer
      pages:
        description: Pages 总页数。
        example: 10
        type: integer
      total:
        description: Total 总记录数。
        example: 100
        type: integer
    type: object
  dto.CommentReplyCreateReq:
    properties:
      content:
        description: Content 回复内容，去除首尾空白后不能为空，最多 2000 字符。
        example: 收到
        maxLength: 2000
        type: string
      parent_reply_id:
        description: ParentReplyID 上级回复 ID；0 表示直接回复一级评论。
        example: 0
        type: integer
      target_type:
        description: TargetType 评论目标类型：article、moment、guestbook，用于定位一级评论所在表。
        enum:
        - article
        - moment
        - guestbook
        example: article
        type: string
    required:
    - content
    - target_type
    type: object
  dto.CommentReplyResp:
    properties:
      comment_id:
        description: CommentID 一级评论 ID。
        example: 1
        type: integer
      content:
        description: Content 回复内容。
        example: 收到
        type: string
      created_at:
        description: CreatedAt 创建时间。
        type: string
      from_user:
        allOf:
        - $ref: '#/definitions/dto.CommentUserResp'
        description: FromUser 回复者用户摘要。
      from_user_id:
        description: FromUserID 回复者用户 ID。
        example: 2
        type: integer
      id:
        description: ID 回复 ID。
        example: 1
        type: integer
      parent_reply_id:
        description: ParentReplyID 上级回复 ID；0 表示直接回复一级评论。
        example: 0
        type: integer
      target_type:
        description: TargetType 评论目标类型。
        example: article
        type: string
      to_user:
        allOf:
        - $ref: '#/definitions/dto.CommentUserResp'
        description: ToUser 被回复者用户摘要。
      to_user_id:
        description: ToUserID 被回复者用户 ID。
        example: 1
        type: integer
      updated_at:
        description: UpdatedAt 更新时间。
        type: string
    type: object
  dto.CommentUserResp:
    properties:
      avatar_url:
        description: AvatarUrl 用户头像地址。
        example: https://example.com/avatar.png
        type: string
      id:
        description: ID 用户 ID。
        example: 1
        type: integer
      mark:
        description: Mark 用户身份标签。
        example: 注册会员
        type: string
      nickname:
        description: Nickname 用户昵称。
        example: VPT
        type: string
      site:
        description: Site 用户个人站点。
        example: https://yevpt.com
        type: string
      username:
        description: Username 登录账号。
        example: vpt
        type: string
    type: object
  dto.GuestbookCreateReq:
    properties:
      content:
        description: Content 留言内容，去除首尾空白后不能为空，最多 2000 字符。
        example: 来踩踩，博客很棒
        maxLength: 2000
        type: string
      owner_user_id:
        description: OwnerUserID 留言板主人用户 ID；省略时默认给博主 1 留言。
        example: 1
        minimum: 1
        type: integer
    required:
    - content
    type: object
  dto.GuestbookDeleteResp:
    properties:
      id:
        description: ID 被删除的留言 ID。
        example: 1
        type: integer
    type: object
  dto.GuestbookItemResp:
    properties:
      content:
        description: Content 留言内容。
        example: 来踩踩，博客很棒
        type: string
      created_at:
        description: CreatedAt 创建时间。
        type: string
      from_user_id:
        description: FromUserID 留言者用户 ID。
        example: 7
        type: integer
      id:
        description: ID 留言 ID。
        example: 1
        type: integer
      is_liked:
        description: IsLiked 当前用户是否已点赞。
        example: false
        type: boolean
      like_count:
        description: LikeCount 点赞数量。
        example: 3
        type: integer
      owner_user_id:
        description: OwnerUserID 留言板主人用户 ID。
        example: 1
        type: integer
      updated_at:
        description: UpdatedAt 更新时间。
        type: string
      user:
        allOf:
        - $ref: '#/definitions/dto.GuestbookUserResp'
        description: User 留言者用户摘要。
    type: object
  dto.GuestbookLikeResp:
    properties:
      id:
        description: ID 留言 ID。
        example: 1
        type: integer
      is_liked:
        description: IsLiked 当前用户是否已点赞。
        example: true
        type: boolean
      like_count:
        description: LikeCount 点赞数量。
        example: 3
        type: integer
    type: object
  dto.GuestbookPageResp:
    properties:
      list:
        description: List 留言列表。
        items:
          $ref: '#/definitions/dto.GuestbookItemResp'
        type: array
      page:
        description: Page 当前页码。
        example: 1
        type: integer
      page_size:
        description: PageSize 每页数量。
        example: 10
        type: integer
      pages:
        description: Pages 总页数。
        example: 10
        type: integer
      total:
        description: Total 总记录数。
        example: 100
        type: integer
    type: object
  dto.GuestbookUserResp:
    properties:
      avatar_url:
        description: AvatarUrl 用户头像地址。
        example: https://example.com/avatar.png
        type: string
      id:
        description: ID 用户 ID。
        example: 1
        type: integer
      mark:
        description: Mark 用户身份标签。
        example: 注册会员
        type: string
      nickname:
        description: Nickname 用户昵称。
        example: VPT
        type: string
      site:
        description: Site 用户个人站点。
        example: https://yevpt.com
        type: string
      username:
        description: Username 登录账号。
        example: vpt
        type: string
    type: object
  dto.LoginReq:
    properties:
      identifier:
        type: string
      password:
        type: string
    required:
    - identifier
    - password
    type: object
  dto.LoginResp:
    properties:
      access_token:
        type: string
      expires_in:
        description: 单位：秒，固定 7200（2h）
        type: integer
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/dto.UserResp'
    type: object
  dto.MomentDeleteResp:
    properties:
      id:
        description: ID 被删除的碎语 ID。
        example: 1
        type: integer
    type: object
  dto.MomentItemResp:
    properties:
      comment_count:
        description: CommentCount 评论数量。
        example: 2
        type: integer
      comment_status:
        description: CommentStatus 评论状态：0 关闭，1 开启。
        example: 1
        type: integer
      content:
        description: Content 碎语正文。
        example: 今天的风很温柔
        type: string
      created_at:
        description: CreatedAt 创建时间。
        type: string
      id:
        description: ID 碎语 ID。
        example: 1
        type: integer
      images:
        description: Images 图片列表。
        items:
          $ref: '#/definitions/dto.MomentMediaResp'
        type: array
      is_liked:
        description: IsLiked 当前用户是否已点赞。
        example: false
        type: boolean
      is_top:
        description: IsTop 是否置顶。
        example: false
        type: boolean
      like_count:
        description: LikeCount 点赞数量。
        example: 3
        type: integer
      read_count:
        description: ReadCount 阅读数量。
        example: 20
        type: integer
      status:
        description: Status 状态：0 隐藏，1 公开。
        example: 1
        type: integer
      updated_at:
        description: UpdatedAt 更新时间。
        type: string
      user:
        allOf:
        - $ref: '#/definitions/dto.MomentUserResp'
        description: User 作者摘要。
      user_id:
        description: UserID 作者用户 ID。
        example: 1
        type: integer
    type: object
  dto.MomentLikeResp:
    properties:
      is_liked:
        description: IsLiked 当前用户是否已点赞。
        example: true
        type: boolean
      like_count:
        description: LikeCount 点赞数量。
        example: 3
        type: integer
    type: object
  dto.MomentMediaReq:
    properties:
      file_type:
        description: FileType 图片文件类型或扩展名。
        example: jpg
        type: string
      name:
        description: Name 图片原始文件名。
        example: cat.jpg
        type: string
      seq:
        description: Seq 图片排序值，越小越靠前。
        example: 1
        type: integer
      size:
        description: Size 图片大小，单位字节。
        example: 1024
        type: integer
      url:
        description: URL 图片对象 key 或可访问 URL。
        example: moments/cat.jpg
        maxLength: 1000
        type: string
    required:
    - url
    type: object
  dto.MomentMediaResp:
    properties:
      access_url:
        description: AccessURL 可直接访问的图片地址。
        example: https://cdn.example.com/moments/cat.jpg
        type: string
      file_type:
        description: FileType 图片文件类型或扩展名。
        example: jpg
        type: string
      id:
        description: ID 图片 ID。
        example: 1
        type: integer
      name:
        description: Name 图片原始文件名。
        example: cat.jpg
        type: string
      seq:
        description: Seq 图片排序值。
        example: 1
        type: integer
      size:
        description: Size 图片大小，单位字节。
        example: 1024
        type: integer
      url:
        description: URL 图片对象 key 或原始 URL。
        example: moments/cat.jpg
        type: string
    type: object
  dto.MomentPageResp:
    properties:
      list:
        description: List 碎语列表。
        items:
          $ref: '#/definitions/dto.MomentItemResp'
        type: array
      page:
        description: Page 当前页码。
        example: 1
        type: integer
      page_size:
        description: PageSize 每页数量。
        example: 10
        type: integer
      pages:
        description: Pages 总页数。
        example: 10
        type: integer
      total:
        description: Total 总记录数。
        example: 100
        type: integer
    type: object
  dto.MomentReadResp:
    properties:
      id:
        description: ID 碎语 ID。
        example: 1
        type: integer
      read_count:
        description: ReadCount 阅读数量。
        example: 21
        type: integer
    type: object
  dto.MomentSaveReq:
    properties:
      comment_status:
        description: CommentStatus 评论状态：0 关闭，1 开启。
        enum:
        - 0
        - 1
        example: 1
        type: integer
      content:
        description: Content 碎语正文，去除首尾空白后不能为空，最多 800 字符。
        example: 今天的风很温柔
        maxLength: 800
        type: string
      id:
        description: ID 碎语 ID，为空或 0 表示新增。
        example: 1
        type: integer
      images:
        description: Images 图片列表，会整体替换该碎语原有图片。
        items:
          $ref: '#/definitions/dto.MomentMediaReq'
        type: array
      status:
        description: Status 状态：0 隐藏，1 公开。
        enum:
        - 0
        - 1
        example: 1
        type: integer
      user_id:
        description: UserID 作者用户 ID；管理员可传入代管作者，普通用户会被强制设置为当前登录用户。
        example: 1
        type: integer
    required:
    - content
    type: object
  dto.MomentTopResp:
    properties:
      id:
        description: ID 碎语 ID。
        example: 1
        type: integer
      is_top:
        description: IsTop 是否置顶。
        example: true
        type: boolean
    type: object
  dto.MomentUserResp:
    properties:
      avatar_url:
        description: AvatarUrl 用户头像地址。
        example: https://example.com/avatar.png
        type: string
      id:
        description: ID 用户 ID。
        example: 1
        type: integer
      mark:
        description: Mark 用户身份标签。
        example: 博主
        type: string
      nickname:
        description: Nickname 用户昵称。
        example: VPT
        type: string
      site:
        description: Site 用户个人站点。
        example: https://yevpt.com
        type: string
      username:
        description: Username 登录账号。
        example: vpt
        type: string
    type: object
  dto.RefreshReq:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dto.RegisterReq:
    properties:
      code:
        type: string
      email:
        type: string
      nickname:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - code
    - email
    - password
    type: object
  dto.SendCodeReq:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  dto.TagArticlesReq:
    properties:
      article_ids:
        description: ArticleIDs 文章 ID 列表；单篇文章也使用一个元素的数组。
        example:
        - 1
        items:
          type: integer
        type: array
    required:
    - article_ids
    type: object
  dto.TagArticlesResp:
    properties:
      affected_count:
        description: AffectedCount 实际影响的关联数量。
        example: 2
        type: integer
      article_ids:
        description: ArticleIDs 本次请求归一化后的文章 ID 列表。
        items:
          type: integer
        type: array
      tag_id:
        description: TagID 标签 ID。
        example: 1
        type: integer
    type: object
  dto.TagCreateReq:
    properties:
      cover_img_url:
        description: CoverImgUrl 封面图地址或对象 key。
        example: covers/go.jpg
        type: string
      description:
        description: Description 标签描述。
        example: Go 语言相关内容
        type: string
      icon:
        description: Icon 图标地址或对象 key。
        example: icons/go.svg
        type: string
      name:
        description: Name 标签名称。
        example: Go
        type: string
      seq:
        description: Seq 排序值，越小越靠前；0 是有效值，因此用指针区分未传。
        example: 0
        type: integer
      url:
        description: URL 标签路由别名。
        example: go
        type: string
    required:
    - name
    - seq
    type: object
  dto.TagItemResp:
    properties:
      article_count:
        description: ArticleCount 该标签下的公开文章数量。
        example: 12
        type: integer
      cover_img_url:
        description: CoverImgUrl 封面图地址或对象 key。
        type: string
      description:
        description: Description 标签描述。
        type: string
      icon:
        description: Icon 图标 URL 或对象 key。
        type: string
      id:
        description: ID 标签 ID。
        example: 1
        type: integer
      name:
        description: Name 标签名称。
        example: Go
        type: string
      seq:
        description: Seq 排序值，越小越靠前。
        example: 0
        type: integer
      url:
        description: URL 标签路由别名。
        example: go
        type: string
    type: object
  dto.TagListResp:
    properties:
      list:
        description: List 标签列表，按 seq ASC、文章数量 DESC 排序。
        items:
          $ref: '#/definitions/dto.TagItemResp'
        type: array
    type: object
  dto.TagUpdateReq:
    properties:
      cover_img_url:
        description: CoverImgUrl 封面图地址或对象 key；传空字符串表示清空。
        example: covers/go.jpg
        type: string
      description:
        description: Description 标签描述；传空字符串表示清空。
        example: Go 语言相关内容
        type: string
      icon:
        description: Icon 图标地址或对象 key；传空字符串表示清空。
        example: icons/go.svg
        type: string
      name:
        description: Name 标签名称。
        example: Go
        type: string
      seq:
        description: Seq 排序值，越小越靠前。
        example: 0
        type: integer
      url:
        description: URL 标签路由别名；传空字符串表示清空。
        example: go
        type: string
    type: object
  dto.TokenResp:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
    type: object
  dto.UserResp:
    properties:
      email:
        type: string
      id:
        type: integer
      nickname:
        type: string
      roles:
        items:
          type: string
        type: array
      username:
        type: string
    type: object
  response.Response:
    properties:
      code:
        description: 0 表示成功，非 0 为业务错误码
        type: integer
      data:
        description: 失败时省略，不输出 null
      message:
        type: string
    type: object
info:
  contact: {}
  description: 个人博客后端 API 服务，所有业务接口均使用统一响应结构。
  title: Blog Backend API
  version: "1.0"
paths:
  /admin/articles:
    post:
      consumes:
      - application/json
      description: 管理员新增或更新文章，并同步分类、标签、音乐和推荐关系。
      parameters:
      - description: 文章保存请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ArticleSaveReq'
      produces:
      - application/json
      responses:
        "200":
          description: 统一响应；code=0 表示保存成功，code=400 表示参数错误或业务错误
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.ArticleDetailResp'
              type: object
        "401":
          description: 未登录或 token 已过期
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: 文章不存在
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      summary: 新增或更新文章
      tags:
      - 文章管理
  /admin/articles/{id}:
    delete:
      consumes:
      - application/json
      description: 管理员软删除文章。
      parameters:
      - description: 文章 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 统一响应；code=0 表示删除成功，code=400 表示参数错误
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.ArticleDetailResp'
              type: object
        "401":
          description: 未登录或 token 已过期
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: 文章不存在
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      summary: 删除文章
      tags:
      - 文章管理
  /admin/categories:
    post:
      consumes:
      - application/json
      description: 管理员新增分类；父分类字段仅预留，当前不处理父子层级。
      parameters:
      - description: 分类新增请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CategoryCreateReq'
      produces:
      - application/json
      responses:
        "200":
          description: 统一响应；code=0 表示新增成功，code=400 表示参数错误
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.CategoryItemResp'
              type: object
        "401":
          description: 未登录或 token 已过期
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      summary: 新增分类
      tags:
      - 分类
  /admin/categories/{id}:
    delete:
      description: 管理员删除分类，并清空该分类下文章关联；文章本身不会被删除。
      parameters:
      - description: 分类 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 统一响应；code=0 表示删除成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.CategoryItemResp'
              type: object
        "401":
          description: 未登录或 token 已过期
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: 分类不存在
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      summary: 删除分类
      tags:
      - 分类
    put:
      consumes:
      - application/json
      description: 管理员修改分类名称、排序、图标、描述、封面等属性。
      parameters:
      - description: 分类 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 分类修改请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CategoryUpdateReq'
      produces:
      - application/json
      responses:
        "200":
          description: 统一响应；code=0 表示修改成功，code=400 表示参数错误
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.CategoryItemResp'
              type: object
        "401":
          description: 未登录或 token 已过期
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: 分类不存在
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      summary: 修改分类
      tags:
      - 分类
  /admin/categories/{id}/articles:
    delete:
      consumes:
      - application/json
      description: 管理员批量移除分类下文章关联；文章本身不会被删除。
      parameters:
      - description: 分类 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 文章 ID 列表
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CategoryArticlesReq'
      produces:
      - application/json
      responses:
        "200":
          description: 统一响应；code=0 表示移除成功，code=400 表示参数错误
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.CategoryArticlesResp'
              type: object
        "401":
          description: 未登录或 token 已过期
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: 分类不存在
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      summary: 删除分类下文章
      tags:
      - 分类
    post:
      consumes:
      - application/json
      description: 管理员把单篇或多篇文章加入分类；文章原有分类关系会迁移到当前分类。
      parameters:
      - description: 分类 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 文章 ID 列表
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CategoryArticlesReq'
      produces:
      - application/json
      responses:
        "200":
          description: 统一响应；code=0 表示添加成功，code=400 表示参数错误
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.CategoryArticlesResp'
              type: object
        "401":
          description: 未登录或 token 已过期
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: 分类或文章不存在
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      summary: 添加文章到分类
      tags:
      - 分类
  /admin/tags:
    post:
      consumes:
      - application/json
      description: 管理员新增标签。
      parameters:
      - description: 标签新增请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.TagCreateReq'
      produces:
      - application/json
      responses:
        "200":
          description: 统一响应；code=0 表示新增成功，code=400 表示参数错误
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.TagItemResp'
              type: object
        "401":
          description: 未登录或 token 已过期
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      summary: 新增标签
      tags:
      - 标签
  /admin/tags/{id}:
    delete:
      description: 管理员删除标签，并清空该标签下文章关联；文章本身不会被删除。
      parameters:
      - description: 标签 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 统一响应；code=0 表示删除成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.TagItemResp'
              type: object
        "401":
          description: 未登录或 token 已过期
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: 标签不存在
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      summary: 删除标签
      tags:
      - 标签
    put:
      consumes:
      - application/json
      description: 管理员修改标签名称、排序、图标、描述、封面等属性。
      parameters:
      - description: 标签 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 标签修改请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.TagUpdateReq'
      produces:
      - application/json
      responses:
        "200":
          description: 统一响应；code=0 表示修改成功，code=400 表示参数错误
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.TagItemResp'
              type: object
        "401":
          description: 未登录或 token 已过期
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: 标签不存在
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      summary: 修改标签
      tags:
      - 标签
  /admin/tags/{id}/articles:
    delete:
      consumes:
      - application/json
      description: 管理员批量移除文章的某个标签；文章本身不会被删除。
      parameters:
      - description: 标签 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 文章 ID 列表
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.TagArticlesReq'
      produces:
      - application/json
      responses:
        "200":
          description: 统一响应；code=0 表示移除成功，code=400 表示参数错误
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.TagArticlesResp'
              type: object
        "401":
          description: 未登录或 token 已过期
          schema:
            $ref: '#/definitions/response.Response'
