name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: krccr.ccs.tencentyun.com
  REGISTRY_USERNAME: "462703445"
  IMAGE_NAME: krccr.ccs.tencentyun.com/yevpt/blog-backend

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run tests
        run: go test ./...

  image:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    outputs:
      image: ${{ env.IMAGE_NAME }}
      tag: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Tencent Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ secrets.TENCENT_REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: image
    if: github.event_name != 'pull_request'
    environment: production
    env:
      REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
      REMOTE_USER: ${{ secrets.REMOTE_USER }}
      REMOTE_PORT: ${{ vars.REMOTE_PORT }}
      DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
      IMAGE_REF: ${{ needs.image.outputs.image }}:${{ needs.image.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          REMOTE_PORT="${REMOTE_PORT:-22}"
          ssh-keyscan -p "$REMOTE_PORT" "$REMOTE_HOST" >> ~/.ssh/known_hosts

      - name: Sync compose and public config
        run: |
          set -euo pipefail
          REMOTE_PORT="${REMOTE_PORT:-22}"
          DEPLOY_DIR="${DEPLOY_DIR:-/opt/blog-backend}"
          ssh -i ~/.ssh/deploy_key -p "$REMOTE_PORT" "$REMOTE_USER@$REMOTE_HOST" \
            "mkdir -p '$DEPLOY_DIR/docker' '$DEPLOY_DIR/config'"
          scp -i ~/.ssh/deploy_key -P "$REMOTE_PORT" docker/docker-compose.yml \
            "$REMOTE_USER@$REMOTE_HOST:$DEPLOY_DIR/docker/docker-compose.yml"
          scp -i ~/.ssh/deploy_key -P "$REMOTE_PORT" config/config.yaml config/config.prod.yaml \
            "$REMOTE_USER@$REMOTE_HOST:$DEPLOY_DIR/config/"

      - name: Deploy with Docker Compose
        run: |
          set -euo pipefail
          REMOTE_PORT="${REMOTE_PORT:-22}"
          DEPLOY_DIR="${DEPLOY_DIR:-/opt/blog-backend}"
          ssh -i ~/.ssh/deploy_key -p "$REMOTE_PORT" "$REMOTE_USER@$REMOTE_HOST" \
            "DEPLOY_DIR='$DEPLOY_DIR' \
             IMAGE_REF='$IMAGE_REF' \
             REGISTRY='${{ env.REGISTRY }}' \
             REGISTRY_USERNAME='${{ env.REGISTRY_USERNAME }}' \
             REGISTRY_PASSWORD='${{ secrets.TENCENT_REGISTRY_PASSWORD }}' \
             bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_DIR/docker"

          if [ ! -f ../.env ]; then
            echo "缺少 $DEPLOY_DIR/.env，请先在服务器创建生产环境变量文件。"
            exit 1
          fi

          printf 'BLOG_SERVER_IMAGE=%s\n' "$IMAGE_REF" > .deploy.env
          printf '%s\n' "$REGISTRY_PASSWORD" | docker login "$REGISTRY" -u "$REGISTRY_USERNAME" --password-stdin
          docker compose --env-file ../.env --env-file .deploy.env pull blog-server
          docker compose --env-file ../.env --env-file .deploy.env up -d --remove-orphans blog-server
          docker compose --env-file ../.env --env-file .deploy.env ps blog-server
          docker image prune -f
          REMOTE
