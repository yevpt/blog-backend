# 公共基础配置 —— 所有环境共享，不含任何敏感信息
# 优先级最低，会被 config.{env}.yaml 和 config.local.yaml 覆盖

server:
  port: 8080
  # debug 模式输出详细日志，生产环境应设为 release
  mode: debug

log:
  level: info
  # json 输出方便日志收集，console 输出方便本地开发阅读
  format: console

jwt:
  # 签名密钥，生产环境必须通过环境变量 BLOG_JWT_SECRET 覆盖
  secret: "change-me-in-production"
  expire_hours: 2
  refresh_expire_hours: 168

db:
  max_open_conns: 10
  max_idle_conns: 5
  max_lifetime_minutes: 30

redis:
  db: 0
  password: ""

garage:
  # Garage S3 兼容接口地址，例如 http://garage.example.com
  endpoint: ""
  bucket: ""
  region: ""
  accessKeyID: ""
  secretAccessKey: ""
  # 是否优先返回 CDN 私有签名 URL；关闭时返回 Garage S3 预签名 URL
  cdn: false

cdn:
  # CDN 访问域名，例如 https://blog-oss.example.com
  host: ""
  secret: ""
  signQueryName: "a"
  timestampQueryName: "b"

oauth:
  # state 同时承载 CSRF 防护和 PKCE verifier 关联，过期后 callback 会被拒绝
  state_ttl_minutes: 10
  providers:
    github:
      enabled: false
      client_id: ""
      client_secret: ""
      redirect_uri: ""
      scopes:
        - "read:user"
        - "user:email"
      auth_url: "https://github.com/login/oauth/authorize"
      token_url: "https://github.com/login/oauth/access_token"
      user_url: "https://api.github.com/user"
    gitee:
      enabled: false
      client_id: ""
      client_secret: ""
      redirect_uri: ""
      scopes:
        - "user_info"
        - "emails"
      auth_url: "https://gitee.com/oauth/authorize"
      token_url: "https://gitee.com/oauth/token"
      user_url: "https://gitee.com/api/v5/user"
    qq:
      enabled: false
      client_id: ""
      client_secret: ""
      redirect_uri: ""
      scopes:
        - "get_user_info"
      auth_url: "https://graph.qq.com/oauth2.0/authorize"
      token_url: "https://graph.qq.com/oauth2.0/token"
      openid_url: "https://graph.qq.com/oauth2.0/me"
      user_url: "https://graph.qq.com/user/get_user_info"
    weibo:
      enabled: false
      client_id: ""
      client_secret: ""
      redirect_uri: ""
      scopes: []
      auth_url: "https://api.weibo.com/oauth2/authorize"
      token_url: "https://api.weibo.com/oauth2/access_token"
      user_url: "https://api.weibo.com/2/users/show.json"
    baidu:
      enabled: false
      client_id: ""
      client_secret: ""
      redirect_uri: ""
      scopes:
        - "basic"
      auth_url: "https://openapi.baidu.com/oauth/2.0/authorize"
      token_url: "https://openapi.baidu.com/oauth/2.0/token"
      user_url: "https://openapi.baidu.com/rest/2.0/passport/users/getInfo"
